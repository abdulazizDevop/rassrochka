services:
  app:
    build: .
    container_name: akhmadpay
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      - app_data:/app/data
      - app_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/data').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app_data:
    driver: local
  app_uploads:
    driver: local
